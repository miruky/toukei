<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" role="img" aria-label="toukeiのアーキテクチャ図">
  <title>toukeiのアーキテクチャ: 同梱スナップショットとe-Statライブ取得の2系統からチャート描画までの流れ</title>
  <style>
    .box { fill: #ffffff; stroke: #c9ced5; rx: 10; }
    .zone { fill: #eff1f4; stroke: #dde1e7; rx: 14; }
    .t { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; fill: #21262c; }
    .h { font-size: 14px; font-weight: 600; }
    .s { font-size: 11px; fill: #5c646e; }
    .zl { font-size: 11px; font-weight: 600; fill: #54618c; letter-spacing: 1px; }
    .arrow { stroke: #5c646e; stroke-width: 1.6; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .box { fill: #1d2027; stroke: #3a3f48; }
      .zone { fill: #171a20; stroke: #2a2e36; }
      .t { fill: #e7e9ec; }
      .s { fill: #99a1ab; }
      .zl { fill: #94a3d6; }
      .arrow { stroke: #99a1ab; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8 Z" fill="#5c646e"/>
    </marker>
  </defs>

  <rect class="zone" x="20" y="20" width="360" height="96"/>
  <text class="t zl" x="36" y="44">同梱データ(キー不要)</text>
  <rect class="box" x="36" y="56" width="328" height="44"/>
  <text class="t h" x="52" y="76">snapshot.ts</text>
  <text class="t s" x="52" y="92">主要4指標の概数時系列(出典明記)</text>

  <rect class="zone" x="400" y="20" width="360" height="96"/>
  <text class="t zl" x="416" y="44">e-Stat API(利用者のappId)</text>
  <rect class="box" x="416" y="56" width="328" height="44"/>
  <text class="t h" x="432" y="76">getStatsData(JSON 3.0)</text>
  <text class="t s" x="432" y="92">任意のstatsDataIdをCORSで直接取得</text>

  <path class="arrow" d="M200 116 V196 H260"/>
  <path class="arrow" d="M580 116 V146"/>

  <rect class="box" x="416" y="150" width="328" height="52"/>
  <text class="t h" x="432" y="171">parseStatsData(estat.ts)</text>
  <text class="t s" x="432" y="188">単要素の非配列・秘匿値・分類名の解決を吸収</text>

  <path class="arrow" d="M580 202 V222 H520"/>

  <rect class="box" x="260" y="180" width="240" height="64"/>
  <text class="t h" x="276" y="202">Series(共通モデル)</text>
  <text class="t s" x="276" y="219">系列名+時系列点の素朴な形に</text>
  <text class="t s" x="276" y="234">両系統を合流させる</text>

  <path class="arrow" d="M380 244 V274"/>

  <rect class="box" x="220" y="278" width="320" height="52"/>
  <text class="t h" x="236" y="299">renderLineChart(chart.ts)</text>
  <text class="t s" x="236" y="316">複数系列・軸の自動目盛・間引きつき折れ線SVG</text>

  <path class="arrow" d="M380 330 V352"/>

  <rect class="zone" x="20" y="356" width="740" height="36"/>
  <text class="t s" x="36" y="379">UI(main.ts): 指標カード・前回比・appId入力(localStorage)・系列凡例・エラー表示・テーマ切替</text>
</svg>
